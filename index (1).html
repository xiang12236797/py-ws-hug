<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Running</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
      animation: pulse 2s infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    p  { font-size: 0.95rem; color: #9ca3af; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>Service Running</h1>
    <p>python-ws — VLESS · Trojan · Shadowsocks over WebSocket</p>
    <p style="margin-top:20px;font-size:0.8rem;color:#6b7280;">Powered by Python / aiohttp</p>
  </div>
</body>
</html>
